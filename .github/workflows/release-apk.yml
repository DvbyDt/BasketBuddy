name: Release Android APK

on:
  schedule:
    - cron: '0 0 */2 * *' # Every 2 days at midnight
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Get latest APK URL from EAS
        id: get_apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        # Run from mobile/ so EAS can read app.config.js and identify the project
        working-directory: mobile
        run: |
          echo "Fetching latest Android build..."
          BUILD_JSON=$(eas build:list \
            --platform android \
            --status finished \
            --limit 1 \
            --non-interactive \
            --json 2>/dev/null)
          echo "Raw EAS response: $BUILD_JSON"
          APK_URL=$(echo "$BUILD_JSON" | jq -r '.[0].artifacts.buildUrl // empty')
          BUILD_ID=$(echo "$BUILD_JSON" | jq -r '.[0].id // empty')
          APP_VERSION=$(echo "$BUILD_JSON" | jq -r '.[0].appVersion // empty')

          if [ -z "$APK_URL" ]; then
            echo "❌ No finished APK build found in EAS."
            echo "   Trigger an EAS build first: eas build --platform android --profile preview"
            exit 1
          fi

          echo "apk_url=$APK_URL" >> "$GITHUB_OUTPUT"
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ Found APK: $APK_URL"

      - name: Download APK
        run: |
          curl -L -o BasketBuddy.apk "${{ steps.get_apk.outputs.apk_url }}"
          ls -lh BasketBuddy.apk

      - name: Create or Update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.get_apk.outputs.app_version }}"
          TAG_NAME="$VERSION"

          # Delete existing release if it exists
          gh release delete "$TAG_NAME" --yes 2>/dev/null || true
          git push origin --delete "$TAG_NAME" 2>/dev/null || true

          # Create new release
          gh release create "$TAG_NAME" \
            BasketBuddy.apk \
            --title "BasketBuddy $VERSION" \
            --notes "## BasketBuddy $VERSION

          ### Download
          Install the APK directly on your Android device.

          ### What's included
          - 🔍 Compare prices across 5 Dublin grocery stores
          - 🧺 Smart basket with AI optimizer
          - 🧾 Receipt splitter
          - 📈 5-week price trends
          - 🔥 Real-time cloud sync via Firebase
          - ➕ Custom items & stores

          **Build:** [${{ steps.get_apk.outputs.build_id }}](https://expo.dev/accounts/dvbydt/projects/basketbuddy/builds/${{ steps.get_apk.outputs.build_id }})"

          echo "✅ Release created: $TAG_NAME"
