name: Build & Release Android APK

on:
  # Manual trigger from GitHub UI → Actions → "Build & Release Android APK" → Run workflow
  workflow_dispatch:
  # Auto-build whenever mobile code changes on main
  push:
    branches: [main]
    paths:
      - 'mobile/**'   # only rebuild when the app itself changes, not docs/scraper

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # EAS free tier builds take ~15–25 min

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # expo-github-action handles EAS CLI install + EXPO_TOKEN auth in one step
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Build APK via EAS (waits for completion)
        id: build
        working-directory: mobile
        run: |
          echo "🏗️  Submitting build to EAS..."
          # Capture both stdout and stderr so no errors are silently swallowed
          # --wait blocks until the build finishes on Expo's servers
          # --json outputs the build object so we can extract the APK URL
          set +e
          BUILD_JSON=$(eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait \
            --json 2>&1)
          EXIT_CODE=$?
          set -e

          echo "Raw EAS build output:"
          echo "$BUILD_JSON"

          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ EAS build command failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi

          # EAS --json returns an array; grab first element
          APK_URL=$(echo "$BUILD_JSON" | jq -r 'if type=="array" then .[0].artifacts.buildUrl else .artifacts.buildUrl end // empty' 2>/dev/null)
          BUILD_ID=$(echo "$BUILD_JSON" | jq -r 'if type=="array" then .[0].id else .id end // empty' 2>/dev/null)
          APP_VER=$(echo "$BUILD_JSON"  | jq -r 'if type=="array" then .[0].appVersion else .appVersion end // empty' 2>/dev/null)

          if [ -z "$APK_URL" ]; then
            echo "❌ Build finished but no APK URL found — check EAS dashboard"
            exit 1
          fi

          echo "✅ APK ready: $APK_URL"
          echo "apk_url=$APK_URL"   >> "$GITHUB_OUTPUT"
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "app_version=$APP_VER" >> "$GITHUB_OUTPUT"

      - name: Download APK
        run: |
          curl -L -o BasketBuddy.apk "${{ steps.build.outputs.apk_url }}"
          echo "APK size: $(du -sh BasketBuddy.apk | cut -f1)"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_ID: ${{ steps.build.outputs.build_id }}
          APP_VERSION: ${{ steps.build.outputs.app_version }}
        run: |
          VERSION="v${APP_VERSION}"

          # Write release notes to a temp file to avoid YAML/shell quoting issues
          cat > release_notes.md << 'NOTES'
          ## BasketBuddy Release

          ### Install
          Download **BasketBuddy.apk** below and open it on your Android device.
          You may need to allow installs from unknown sources in Settings.

          ### What's inside
          - Compare grocery prices across Tesco, Lidl, Aldi, SuperValu and Asian Supermarket
          - Smart basket — see which single store is cheapest for your whole shop
          - Receipt splitter with Groq Vision AI (handles Clubcard discounts automatically)
          - Price trend charts with 5-week history
          - Weekly offer alerts
          - Add custom items and stores
          NOTES

          # Append build link (needs variable expansion so outside the heredoc)
          echo "" >> release_notes.md
          echo "**EAS Build:** https://expo.dev/accounts/dvbydt/projects/basketbuddy/builds/${BUILD_ID}" >> release_notes.md

          # Overwrite the release if it already exists for this version
          gh release delete "$VERSION" --yes 2>/dev/null || true
          git push origin --delete "$VERSION" 2>/dev/null || true

          gh release create "$VERSION" \
            BasketBuddy.apk \
            --title "BasketBuddy ${VERSION}" \
            --notes-file release_notes.md

          echo "✅ GitHub Release created: $VERSION"
