name: Weekly Price Scrape

on:
  schedule:
    # Every Monday at 6:00 AM UTC (7am Irish time)
    - cron: '0 6 * * 1'
  workflow_dispatch:   # also allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scraper/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          pip install playwright requests beautifulsoup4 lxml
          playwright install chromium --with-deps

      - name: Run scraper (unlimited, all stores)
        run: |
          cd scraper
          python unified_scraper.py --limit 0
        # Continues even if one store fails — partial data is better than nothing
        continue-on-error: false

      - name: Show data diff summary
        run: |
          echo "=== data.json item count ==="
          python3 -c "
          import json
          with open('mobile/shared/data.json') as f:
              d = json.load(f)
          items = d.get('items', [])
          stores = {}
          for item in items:
              for s in item.get('prices', {}):
                  stores[s] = stores.get(s, 0) + 1
          print(f'Total items: {len(items)}')
          for s, c in sorted(stores.items(), key=lambda x: -x[1]):
              print(f'  {s}: {c}')
          "

      - name: Commit updated data
        run: |
          git config user.name  "BasketBuddy Bot"
          git config user.email "bot@basketbuddy.ie"
          git add mobile/shared/data.json web/js/data.js
          # Only commit if something actually changed
          git diff --cached --quiet && echo "No price changes this week." || \
            git commit -m "chore: weekly price update $(date +'%Y-%m-%d')"

      - name: Push changes
        run: git push
        # Only pushes when there were actual changes (commit step above)
